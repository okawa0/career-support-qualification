<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>プロ資格認定と就業支援</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
    <main>
        <section class="qualification">
            <div class="qualification__inner">
                <h1 class="qualification__title">プロ資格認定と就業支援</h1>

                <dl class="qualification__list">
                    <div class="qualification__item qualification__item--fee">
                        <dt class="qualification__label">試験料</dt>
                        <dd class="qualification__content">
                            <span class="qualification__price">4,000円</span>
                        </dd>
                    </div>

                    <div class="qualification__item">
                        <dt class="qualification__label">試験内容</dt>
                        <dd class="qualification__content">
                            <p class="qualification__text">
                                ビジネス文章を制限時間10分で入力します。これを3回行います。
                            </p>
                        </dd>
                    </div>

                    <div class="qualification__item">
                        <dt class="qualification__label">メリット</dt>
                        <dd class="qualification__content">
                            <p class="qualification__text">
                                パソコン操作の基本であるキーボードを入力評価します。手元を見ずに入力するタッチタイピング能力が求められます。タイピングをスキルアップすれば仕事をより速く、正確にこなすことができます。
                            </p>
                        </dd>
                    </div>
                </dl>
            </div>
        </section>
    </main>
</body>

</html>
